services:
  genai2openai:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    ports:
      - "${HOST_PORT:-5000}:${APP_PORT:-5000}"
    environment:
      APP_PORT: ${APP_PORT:-5000}
      GENAI_TOKEN: ${GENAI_TOKEN:-}
      KEYSTORE_PATH: ${KEYSTORE_PATH:-}
      API_KEY: ${PROXY_API_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-0}
      CLAUDE_HAIKU_MODEL: ${CLAUDE_HAIKU_MODEL:-qwen-instruct}
      CLAUDE_SONNET_MODEL: ${CLAUDE_SONNET_MODEL:-qwen-instruct}
      CLAUDE_OPUS_MODEL: ${CLAUDE_OPUS_MODEL:-deepseek-v3:671b}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-8}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-180}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-10}
      GUNICORN_MAX_REQUESTS: ${GUNICORN_MAX_REQUESTS:-0}
      GUNICORN_MAX_REQUESTS_JITTER: ${GUNICORN_MAX_REQUESTS_JITTER:-0}
    volumes:
      - type: bind
        source: ${KEYSTORE_HOST_PATH:-./docker-deploy.keystore}
        target: /app/docker-deploy.keystore
        read_only: false
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        if [ -z "$${GENAI_TOKEN:-}" ] && [ -z "$${KEYSTORE_PATH:-}" ]; then
          echo "Either GENAI_TOKEN or KEYSTORE_PATH must be set." >&2
          exit 1
        fi

        if [ "$${APP_DEBUG:-0}" = "1" ]; then
          log_level=debug
        else
          log_level=info
        fi

        exec gunicorn \
          --bind "0.0.0.0:$${APP_PORT}" \
          --worker-class gthread \
          --workers "$${GUNICORN_WORKERS:-2}" \
          --threads "$${GUNICORN_THREADS:-8}" \
          --timeout "$${GUNICORN_TIMEOUT:-180}" \
          --graceful-timeout "$${GUNICORN_GRACEFUL_TIMEOUT:-30}" \
          --keep-alive "$${GUNICORN_KEEPALIVE:-10}" \
          --max-requests "$${GUNICORN_MAX_REQUESTS:-0}" \
          --max-requests-jitter "$${GUNICORN_MAX_REQUESTS_JITTER:-0}" \
          --log-level "$${log_level}" \
          --access-logfile - \
          --error-logfile - \
          --capture-output \
          main:app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\\\"APP_PORT\\\", \\\"5000\\\")}/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
