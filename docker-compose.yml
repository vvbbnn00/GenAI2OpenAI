services:
  genai2openai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genai2openai
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:${APP_PORT:-5000}"
    environment:
      APP_PORT: ${APP_PORT:-5000}
      GENAI_TOKEN: ${GENAI_TOKEN:-}
      KEYSTORE_PATH: ${KEYSTORE_PATH:-}
      API_KEY: ${PROXY_API_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-0}
      CLAUDE_HAIKU_MODEL: ${CLAUDE_HAIKU_MODEL:-qwen-instruct}
      CLAUDE_SONNET_MODEL: ${CLAUDE_SONNET_MODEL:-qwen-instruct}
      CLAUDE_OPUS_MODEL: ${CLAUDE_OPUS_MODEL:-deepseek-v3:671b}
    # Uncomment this when using passkey auto-login / refresh.
    # volumes:
    #   - ./docker-deploy.keystore:/app/docker-deploy.keystore:ro
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        if [ -z "$${GENAI_TOKEN:-}" ] && [ -z "$${KEYSTORE_PATH:-}" ]; then
          echo "Either GENAI_TOKEN or KEYSTORE_PATH must be set." >&2
          exit 1
        fi

        set -- python main.py --port "$${APP_PORT}"

        if [ -n "$${GENAI_TOKEN:-}" ]; then
          set -- "$$@" --token "$${GENAI_TOKEN}"
        fi

        if [ -n "$${KEYSTORE_PATH:-}" ]; then
          set -- "$$@" --keystore "$${KEYSTORE_PATH}"
        fi

        if [ -n "$${API_KEY:-}" ]; then
          set -- "$$@" --api-key "$${API_KEY}"
        fi

        if [ "$${APP_DEBUG:-0}" = "1" ]; then
          set -- "$$@" --debug
        fi

        exec "$$@"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\\\"APP_PORT\\\", \\\"5000\\\")}/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
